# config.yaml — India monitor thresholds and runtime settings.

alerts:
  cooldown_days: 7
  email:
    smtp_host: smtp.gmail.com
    smtp_port: 587
    from_address: ""            # Filled at runtime from Keychain (reuses portfolio-monitor secret)
    to_address: mandeepmakkar@gmail.com

# Sell-near-high rule
sell_near_high:
  enabled: true
  ath_threshold_pct: 0.85       # Alert when price >= 85% of all-time high
  long_term_only: true          # Only alert if holding is marked long_term: true in holdings.yaml
  require_exhaustion_signal: true
  exhaustion_max_analyst_upside: 0.10   # Analyst target implies ≤10% left
  exhaustion_rsi_overbought: 70.0       # RSI ≥ 70 = momentum stretched
  exhaustion_bb_pct_b: 0.80             # BB %B ≥ 0.80 = near upper band
  exhaustion_ma50_extension: 0.10       # Price ≥ 10% above MA50 = extended

# Exit momentum rule — fires for exit_now, exit_soon, sell_on_rally tiers
exit_momentum:
  enabled: true
  exit_now_rsi_threshold: 65
  exit_now_day_pop_pct: 0.02
  exit_now_five_day_pct: 0.04
  exit_now_consecutive_days: 2
  rally_rsi_threshold: 60
  rally_day_pop_pct: 0.03
  rally_five_day_pct: 0.06
  rally_consecutive_days: 3

# Bounce alert rule — fires for wait_for_bounce tier when recovery signals appear
bounce_alert:
  enabled: true
  rsi_recovery_threshold: 35
  consecutive_up_days: 3
  five_day_pct: 0.05
  ma50_reclaim_as_trigger: true   # Phase 3: also trigger when price reclaims the 50-day average
  require_consecutive_days: true  # Must have 3+ consecutive up days (not just RSI alone)
  require_near_breakeven: true    # Only alert if within 10% of cost basis
  near_breakeven_threshold: 0.10

# MA Crossover — Phase 4
# Detects when 50-day average crosses the 200-day average for any held position.
# Golden cross (MA50 above MA200) = recovery confirmed.
# Death cross (MA50 below MA200) = selling becoming a trend.
# 30-day cooldown prevents re-alerting while averages hover near each other.
ma_crossover:
  enabled: true
  cooldown_days: 30

# Data sources
data_sources:
  ath_history_period: max       # yfinance period for computing ATH

# Logging
logging:
  level: INFO
  retain_days: 90
