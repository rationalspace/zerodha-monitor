# realized_pnl.example.yaml — Template for realized_pnl.yaml
# Copy to realized_pnl.yaml and record your own closed positions.
# realized_pnl.yaml is git-ignored (contains your private trade history).
#
# Fields:
#   date:            Trade date (YYYY-MM-DD), use ~ if unknown
#   symbol:          NSE ticker
#   description:     Company name
#   shares_sold:     Number of shares sold
#   price_per_share: Sell price (₹)
#   average_cost:    Average cost per share (₹)
#   cost_basis:      Total cost of shares sold (₹)
#   proceeds:        Net proceeds from sale (₹)
#   gain_loss:       Net realized gain/loss (₹)
#   return_pct:      Percentage return
#   term:            "long" (LTCG, held >1yr) | "short" (STCG, held ≤1yr)
#   fy:              Indian financial year (e.g. "FY2025-26" = Apr 2025–Mar 2026)
#   notes:           Optional context

realized_trades:

  - date: "2025-09-10"
    symbol: INFY
    description: "Infosys Ltd"
    shares_sold: 100
    price_per_share: 1800.00
    average_cost: 900.00
    cost_basis: 90000.00
    proceeds: 180000.00
    gain_loss: +90000.00
    return_pct: +100.0
    term: long
    fy: "FY2025-26"
    notes: "Full position exit. +100% LTCG."

# ── Summary by Financial Year ────────────────────────────────────────────────
#
# FY2025-26:
#   INFY: +₹90,000  (LTCG)
